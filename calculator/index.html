d="calcResult" style="background-color: #f2f2f2; border: 1px solid #ccc; padding: 8px; color: purple; font-size: 18px; min-width: 100px;"> Result: - </div> <button id="animateBtn" onclick="toggleAnimation()">Start Animation</button> <div style="display: flex; align-items: center; gap: 10px;"> <label for="speed">Speed:</label> <input type="range" id="speed" min="1" max="10" value="5" class="small-slider"> </div> </div> </div> <div class="controls"> <fieldset> <legend>Punkt P </legend> <div> <label for="pX">X:</label> <input type="number" id="pX" value="0" min="0" max="200" step="1" class="small-input"> <input type="range" id="pX_slider" value="0" min="0" max="200" step="1" class="small-slider"> </div> <div> <label for="pY">Y:</label> <input type="number" id="pY" value="0" min="0" max="200" step="1" class="small-input"> <input type="range" id="pY_slider" value="0" min="0" max="200" step="1" class="small-slider"> </div> </fieldset> <fieldset> <legend>Punkt M</legend> <div> <label for="mX">X:</label> <input type="number" id="mX" value="0" min="0" max="200" step="1" class="small-input"> <input type="range" id="mX_slider" value="0" min="0" max="200" step="1" class="small-slider"> </div> <div> <label for="mY">Y:</label> <input type="number" id="mY" value="150" min="0" max="200" step="1" class="small-input"> <input type="range" id="mY_slider" value="150" min="0" max="200" step="1" class="small-slider"> </div> </fieldset> <fieldset> <legend>New Center</legend> <div> <label for="nX">X:</label> <input type="number" id="nX" value="150" min="0" max="200" step="1" class="small-input"> <input type="range" id="nX_slider" value="150" min="0" max="200" step="1" class="small-slider"> </div> <div> <label for="nY">Y:</label> <input type="number" id="nY" value="75" min="0" max="200" step="1" class="small-input"> <input type="range" id="nY_slider" value="75" min="0" max="200" step="1" class="small-slider"> </div> </fieldset> <fieldset> <legend>Old Center</legend> <div> <label for="oX">X:</label> <input type="number" id="oX" value="150" min="0" max="200" step="1" class="small-input"> <input type="range" id="oX_slider" value="150" min="0" max="200" step="1" class="small-slider"> </div> <div> <label for="oY">Y:</label> <input type="number" id="oY" value="0" min="0" max="200" step="1" class="small-input"> <input type="range" id="oY_slider" value="0" min="0" max="200" step="1" class="small-slider"> </div> </fieldset> <fieldset> <legend>Z-Modul</legend> <div> <label for="zX">X:</label> <input type="number" id="zX" value="0" min="0" max="200" step="1" class="small-input"> <input type="range" id="zX_slider" value="0" min="0" max="200" step="1" class="small-slider"> </div> <div> <label for="zY">Y:</label> <input type="number" id="zY" value="0" min="0" max="200" step="1" class="small-input"> <input type="range" id="zY_slider" value="0" min="0" max="200" step="1" class="small-slider"> </div> </fieldset> <fieldset> <legend>Scan config</legend> <div> <label for="deltaScan">DeltaScan [int]:</label> <input type="number" id="deltaScan" value="0" min="0" step="1" class="small-input"> </div> <div> <label for="numberOfMeasurements">Number of Measurements [int]:</label> <input type="number" id="numberOfMeasurements" value="0" min="0" step="1" class="small-input"> </div> </fieldset> </div> </div> <div id="resultsContainer"></div> <script>
function generateResultsTable() {
    const numberOfMeasurements = parseInt(document.getElementById('numberOfMeasurements').value, 10);
    const pY = parseFloat(document.getElementById('pY').value);
    const zX = parseFloat(document.getElementById('zX').value); // Fester X-Wert des Z-Moduls
    const nX = parseFloat(document.getElementById('nX').value);  // New Center X
    const nY = parseFloat(document.getElementById('nY').value);  // New Center Y
    
    const deltaScan = parseFloat(document.getElementById('deltaScan').value);
    let result = 0;
    if (numberOfMeasurements > 0) {
        result = deltaScan / numberOfMeasurements;
    }
    
    let table = '<table border="1" cellspacing="0" cellpadding="5" style="border-collapse: collapse;">';
    table += '<tr><th>Angle (°)</th><th>Zmodule (Coordinates)</th></tr>';
    
    for (let i = 0; i < numberOfMeasurements; i++) {
        // Y-Wert für diese Zeile berechnen
        const currentY = pY + result * i;
        
        // Winkelberechnung MIT AKTUELLEM Y-WERT
        const dx = nX - zX;                  // X-Distanz (konstant)
        const dy = nY - currentY;             // Y-Distanz (variiert pro Zeile)
        let angle = Math.atan2(dy, dx) * 180 / Math.PI;
        angle = Math.abs(90 - angle);         // Winkelkorrektur
        
        table += `<tr>
            <td>${angle.toFixed(1)}</td>
            <td>(${zX.toFixed(1)}, ${currentY.toFixed(1)})</td>
        </tr>`;
    }
    table += '</table>';
    
    document.getElementById('resultsContainer').innerHTML = table;
}
</script> <p><button onclick="generateResultsTable()">Generate Results Table</button></p> <style>.calculator-container{display:flex;flex-direction:column;align-items:center;gap:20px;padding:2rem}#coordinateSystem{background:#f8f9fa;border:1px solid #ddd;border-radius:8px}.animation-layout{justify-content:center}.controls{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}fieldset{border:1px solid #ccc;padding:10px;border-radius:4px}fieldset>div{margin-bottom:10px}label{font-size:14px;margin-right:5px}input.small-input{width:80px;padding:2px;margin-right:5px}input.small-slider{width:150px;margin-right:5px}button{padding:8px 16px;background:#007bff;color:white;border:0;border-radius:4px;cursor:pointer}button:hover{background:#0056b3}</style> <script>
// Existing JavaScript code remains unchanged.
let isAnimating = false;
let animationId = null;

function syncInputs(numberId, sliderId) {
    const numberInput = document.getElementById(numberId);
    const sliderInput = document.getElementById(sliderId);
    
    numberInput.addEventListener('input', () => {
        sliderInput.value = numberInput.value;
        updatePositions();
    });
    sliderInput.addEventListener('input', () => {
        numberInput.value = sliderInput.value;
        updatePositions();
    });
}

syncInputs('pX', 'pX_slider');
syncInputs('pY', 'pY_slider');
syncInputs('mX', 'mX_slider');
syncInputs('mY', 'mY_slider');
syncInputs('nX', 'nX_slider');
syncInputs('nY', 'nY_slider');
syncInputs('oX', 'oX_slider');
syncInputs('oY', 'oY_slider');
syncInputs('zX', 'zX_slider');
syncInputs('zY', 'zY_slider');

function updatePositions() {
    const pX = parseFloat(document.getElementById('pX').value);
    const pY = parseFloat(document.getElementById('pY').value);
    const mX = parseFloat(document.getElementById('mX').value);
    const mY = parseFloat(document.getElementById('mY').value);
    const nX = parseFloat(document.getElementById('nX').value);
    const nY = parseFloat(document.getElementById('nY').value);
    const oX = parseFloat(document.getElementById('oX').value);
    const oY = parseFloat(document.getElementById('oY').value);
    const zX = parseFloat(document.getElementById('zX').value);
    const zY = parseFloat(document.getElementById('zY').value);

    document.getElementById('pointP').setAttribute('cx', pX);
    document.getElementById('pointP').setAttribute('cy', pY);
    document.getElementById('pointM').setAttribute('cx', mX);
    document.getElementById('pointM').setAttribute('cy', mY);
    document.getElementById('newCenter').setAttribute('cx', nX);
    document.getElementById('newCenter').setAttribute('cy', nY);
    document.getElementById('oldCenter').setAttribute('cx', oX);
    document.getElementById('oldCenter').setAttribute('cy', oY);
    document.getElementById('zModule').setAttribute('cx', zX);
    document.getElementById('zModule').setAttribute('cy', zY);

    const zLine = document.getElementById('zModuleLine');
    zLine.setAttribute('x1', zX);
    zLine.setAttribute('y1', zY);
    zLine.setAttribute('x2', nX);
    zLine.setAttribute('y2', nY);

    const baselineY = nY;
    const greenPoints = `${nX},${nY} 0,${baselineY} ${mX},${mY} ${nX},${nY}`;
    document.getElementById('greenPolyline').setAttribute('points', greenPoints);

    const redPoints = `${pX},${pY} ${nX},${nY} 0,${baselineY} ${pX},${pY}`;
    document.getElementById('redPolyline').setAttribute('points', redPoints);

    const blueLine = document.getElementById('blueLine');
    blueLine.setAttribute('x1', nX);
    blueLine.setAttribute('y1', nY);
    blueLine.setAttribute('x2', oX);
    blueLine.setAttribute('y2', oY);

    const dx = nX - zX;
    const dy = nY - zY;
    let alpha = Math.atan2(dy, dx) * 180 / Math.PI;
    const angle_v = Math.abs(90 - alpha);

    document.getElementById('angleDisplay').textContent = `Angle: ${angle_v.toFixed(1)}°`;

    // Update calculation field for DeltaScan / Number of Measurements
    const deltaScan = parseFloat(document.getElementById('deltaScan').value);
    const numberOfMeasurements = parseFloat(document.getElementById('numberOfMeasurements').value);
    if (numberOfMeasurements > 0) {
        const result = deltaScan / numberOfMeasurements;
        document.getElementById('calcResult').textContent = `Result: ${result.toFixed(2)} cm`;
    } else {
        document.getElementById('calcResult').textContent = 'Result: -';
    }

    const radius = 20;
    const startAngle = 90;
    const radStart = startAngle * Math.PI / 180;
    const radEnd = alpha * Math.PI / 180;
    const startX = zX + radius * Math.cos(radStart);
    const startY = zY + radius * Math.sin(radStart);
    const endX = zX + radius * Math.cos(radEnd);
    const endY = zY + radius * Math.sin(radEnd);
    const largeArcFlag = 0;
    const sweepFlag = (alpha >= 90) ? 1 : 0;
    const d = `M ${startX},${startY} A ${radius} ${radius} 0 ${largeArcFlag} ${sweepFlag} ${endX},${endY}`;
    document.getElementById('angleArc').setAttribute('d', d);
}

function toggleAnimation() {
    const btn = document.getElementById('animateBtn');
    const speed = document.getElementById('speed').value;
    const zMin = parseFloat(document.getElementById('pY').value);
    const zMax = parseFloat(document.getElementById('mY').value);

    let zYVal = zMin;
    let step = (zMax - zMin) / (60 * (10 - speed + 1));
    let direction = 1;
    
    function animate() {
        zYVal += direction * step;
        if (zYVal >= zMax) {
            zYVal = zMax;
            direction = -1;
        } else if (zYVal <= zMin) {
            zYVal = zMin;
            direction = 1;
        }
        document.getElementById('zY').value = zYVal.toFixed(0);
        document.getElementById('zY_slider').value = zYVal.toFixed(0);
        updatePositions();
        animationId = requestAnimationFrame(animate);
    }
    if (!isAnimating) {
        animationId = requestAnimationFrame(animate);
        btn.textContent = 'Stop Animation';
    } else {
        cancelAnimationFrame(animationId);
        btn.textContent = 'Start Animation';
    }
    isAnimating = !isAnimating;
}

function restartAnimationIfNeeded() {
    if (isAnimating) {
        cancelAnimationFrame(animationId);
        isAnimating = false;
        document.getElementById('animateBtn').textContent = 'Start Animation';
        toggleAnimation();
    }
}

updatePositions();

document.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', updatePositions);
});

document.getElementById('pX').addEventListener('change', restartAnimationIfNeeded);
document.getElementById('pY').addEventListener('change', restartAnimationIfNeeded);
document.getElementById('mX').addEventListener('change', restartAnimationIfNeeded);
document.getElementById('mY').addEventListener('change', restartAnimationIfNeeded);

document.addEventListener('keydown', function(e) {
    const pXInput = document.getElementById('pX');
    let value = parseInt(pXInput.value, 10);
    if (e.key === 'ArrowLeft') {
        pXInput.value = Math.max(0, value - 1);
        updatePositions();
    } else if (e.key === 'ArrowRight') {
        pXInput.value = Math.min(200, value + 1);
        updatePositions();
    }
});
</script> </article> </div> </div> <footer class="sticky-bottom mt-5" role="contentinfo"> </footer> <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script> <script src="/assets/js/bootstrap.bundle.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/js/mdb.min.js" integrity="sha256-NdbiivsvWt7VYCt6hYNT3h/th9vSTL4EDWeGs5SN3DA=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha256-Nn1q/fx0H7SNLZMQ5Hw5JLaTRZp0yILA/FRexe19VdI=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/imagesloaded@5.0.0/imagesloaded.pkgd.min.js" integrity="sha256-htrLFfZJ6v5udOG+3kNLINIKh2gvoKqwEhHYfTTMICc=" crossorigin="anonymous"></script> <script defer src="/assets/js/masonry.js?a0db7e5d5c70cc3252b3138b0c91dcaf" type="text/javascript"></script> <script defer src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js" integrity="sha256-ZgMyDAIYDYGxbcpJcfUnYwNevG/xi9OHKaR/8GK+jWc=" crossorigin="anonymous"></script> <script defer src="/assets/js/zoom.js?85ddb88934d28b74e78031fd54cf8308"></script> <script src="/assets/js/no_defer.js?2781658a0a2b13ed609542042a859126"></script> <script defer src="/assets/js/common.js?e0514a05c5c95ac1a93a8dfd5249b92e"></script> <script defer src="/assets/js/copy_code.js?12775fdf7f95e901d7119054556e495f" type="text/javascript"></script> <script defer src="/assets/js/jupyter_new_tab.js?d9f17b6adc2311cbabd747f4538bb15f"></script> <script async src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"></script> <script async src="https://badge.dimensions.ai/badge.js"></script> <script defer type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js" integrity="sha256-MASABpB4tYktI2Oitl4t+78w/lyA+D7b/s9GEP0JOGI=" crossorigin="anonymous
