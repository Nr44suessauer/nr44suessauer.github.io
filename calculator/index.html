  </script> </head> <body class="fixed-top-nav sticky-bottom-footer"> <header> <nav id="navbar" class="navbar navbar-light navbar-expand-sm fixed-top" role="navigation"> <div class="container"> <a class="navbar-brand title font-weight-lighter" href="/"> DeadlineDriven.dev/elopment </a> <button class="navbar-toggler collapsed ml-auto" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"> <span class="sr-only">Toggle navigation</span> <span class="icon-bar top-bar"></span> <span class="icon-bar middle-bar"></span> <span class="icon-bar bottom-bar"></span> </button> <div class="collapse navbar-collapse text-right" id="navbarNav"> <ul class="navbar-nav ml-auto flex-nowrap"> <li class="nav-item "> <a class="nav-link" href="/">about </a> </li> <li class="nav-item "> <a class="nav-link" href="/blog/">blog </a> </li> <li class="nav-item "> <a class="nav-link" href="/projects/">projects </a> </li> <li class="nav-item active"> <a class="nav-link" href="/calculator/">Calculator <span class="sr-only">(current)</span> </a> </li> <li class="nav-item "> <a class="nav-link" href="/resume/">resume </a> </li> <li class="nav-item"> <button id="search-toggle" title="Search" onclick="openSearchModal()"> <span class="nav-link">ctrl k <i class="ti ti-search"></i></span> </button> </li> <li class="toggle-container"> <button id="light-toggle" title="Change theme"> <i class="ti ti-sun-moon" id="light-toggle-system"></i> <i class="ti ti-moon-filled" id="light-toggle-dark"></i> <i class="ti ti-sun-filled" id="light-toggle-light"></i> </button> </li> </ul> </div> </div> </nav> <progress id="progress" value="0"> <div class="progress-container"> <span class="progress-bar"></span> </div> </progress> </header> <div class="container mt-5" role="main"> <div class="post"> <header class="post-header"> <h1 class="post-title">Calculator</h1> <p class="post-description"></p> </header> <article> <h2 style="margin-bottom: 20px;">Benanntes Koordinatensystem</h2> <div class="calculator-container" style="margin-top: 20px;"> <svg id="coordinateSystem" width="600" height="600" viewbox="0 0 200 200" preserveaspectratio="xMidYMid meet" style="margin-bottom:30px;"> <rect x="0" y="0" width="200" height="200" fill="none" stroke="#ccc" stroke-width="0.5"></rect> <line x1="0" y1="100" x2="200" y2="100" stroke="#eee" stroke-dasharray="2"></line> <line x1="100" y1="0" x2="100" y2="200" stroke="#eee" stroke-dasharray="2"></line> <line x1="0" y1="0" x2="200" y2="0" stroke="black" stroke-width="1"></line> <line x1="0" y1="0" x2="0" y2="200" stroke="black" stroke-width="1"></line> <g id="canvas" transform="scale(1,-1) translate(0,-200)"> <text x="10" y="-10" font-size="12" fill="#333">X-Achse</text> <text x="-30" y="10" font-size="12" fill="#333">Y-Achse</text> <polyline id="greenPolyline" points="150,75 0,75 0,150 150,75" stroke="green" stroke-dasharray="4" fill="none"></polyline> <polyline id="redPolyline" points="0,0 150,75 0,75 0,0" stroke="red" stroke-dasharray="5,3,1,3" fill="none"></polyline> <line id="blueLine" x1="150" y1="75" x2="150" y2="0" stroke="blue" stroke-dasharray="4"></line> <circle id="pointP" cx="0" cy="0" r="4" fill="black"></circle> <text id="textP" x="-25" y="-5" font-size="12" transform="scale(1,-1)">Initial Position (0,0)</text> <circle id="pointM" cx="0" cy="150" r="4" fill="green"></circle> <text id="textM" x="-35" y="155" font-size="12" transform="scale(1,-1)">Max Z Wert (0,150)</text> <circle id="newCenter" cx="150" cy="75" r="4" fill="green"></circle> <text id="textNewCenter" x="155" y="80" font-size="12" transform="scale(1,-1)">New Center (150,75)</text> <circle id="oldCenter" cx="150" cy="0" r="4" fill="blue"></circle> <text id="textOldCenter" x="155" y="5" font-size="12" transform="scale(1,-1)">Old Center (150,0)</text> <circle id="zModule" cx="0" cy="0" r="7" fill="purple"></circle> <line id="zModuleLine" x1="0" y1="0" x2="150" y2="75" stroke="black" stroke-dasharray="4"></line> <path id="angleArc" d="" fill="none" stroke="purple" stroke-width="2"></path> <text id="angleText" x="10" y="0" font-size="14" fill="purple" transform="scale(1,-1)"></text> </g> </svg> <div class="controls"> <fieldset> <legend>Punkt P (Initial Position)</legend> <label for="pX">X:</label> <input type="number" id="pX" value="0" step="1"> <label for="pY">Y:</label> <input type="number" id="pY" value="0" step="1"> </fieldset> <fieldset> <legend>Punkt M (Max Z Wert)</legend> <label for="mX">X:</label> <input type="number" id="mX" value="0" step="1"> <label for="mY">Y:</label> <input type="number" id="mY" value="150" step="1"> </fieldset> <fieldset> <legend>New Center</legend> <label for="nX">X:</label> <input type="number" id="nX" value="150" step="1"> <label for="nY">Y:</label> <input type="number" id="nY" value="75" step="1"> </fieldset> <fieldset> <legend>Old Center</legend> <label for="oX">X:</label> <input type="number" id="oX" value="150" step="1"> <label for="oY">Y:</label> <input type="number" id="oY" value="0" step="1"> </fieldset> <fieldset> <legend>Z-Modul (Bewegt sich zwischen Punkt P und Punkt M)</legend> <label for="zX">X:</label> <input type="number" id="zX" value="0" step="1"> <label for="zY">Y:</label> <input type="number" id="zY" value="0" min="0" max="150" step="1"> </fieldset> <button onclick="updatePositions()">Update</button> <button id="animateBtn" onclick="toggleAnimation()">Start Animation</button> <label for="speed">Speed:</label> <input type="range" id="speed" min="1" max="10" value="5"> </div> </div> <style>.calculator-container{display:flex;flex-direction:column;align-items:center;gap:20px;padding:2rem}#coordinateSystem{background:#f8f9fa;border:1px solid #ddd;border-radius:8px;margin:20px auto}.controls{display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:center}fieldset{border:1px solid #ccc;padding:10px;border-radius:4px}label{font-size:14px;margin-right:5px}input[type="number"],input[type="range"]{padding:4px;width:60px;margin-right:10px}button{padding:8px 16px;background:#007bff;color:white;border:0;border-radius:4px;cursor:pointer}button:hover{background:#0056b3}</style> <script>
let isAnimating = false;
let animationId = null;

function updatePositions() {
    // Werten der Punkte abrufen
    const pX = parseFloat(document.getElementById('pX').value);
    const pY = parseFloat(document.getElementById('pY').value);
    const mX = parseFloat(document.getElementById('mX').value);
    const mY = parseFloat(document.getElementById('mY').value);
    const nX = parseFloat(document.getElementById('nX').value);
    const nY = parseFloat(document.getElementById('nY').value);
    const oX = parseFloat(document.getElementById('oX').value);
    const oY = parseFloat(document.getElementById('oY').value);
    const zX = parseFloat(document.getElementById('zX').value);
    const zY = parseFloat(document.getElementById('zY').value);

    // SVG Elemente aktualisieren
    document.getElementById('pointP').setAttribute('cx', pX);
    document.getElementById('pointP').setAttribute('cy', pY);

    document.getElementById('pointM').setAttribute('cx', mX);
    document.getElementById('pointM').setAttribute('cy', mY);

    document.getElementById('newCenter').setAttribute('cx', nX);
    document.getElementById('newCenter').setAttribute('cy', nY);

    document.getElementById('oldCenter').setAttribute('cx', oX);
    document.getElementById('oldCenter').setAttribute('cy', oY);

    document.getElementById('zModule').setAttribute('cx', zX);
    document.getElementById('zModule').setAttribute('cy', zY);

    // Verbindungslinie vom Z-Modul zu newCenter aktualisieren
    const zLine = document.getElementById('zModuleLine');
    zLine.setAttribute('x1', zX);
    zLine.setAttribute('y1', zY);
    zLine.setAttribute('x2', nX);
    zLine.setAttribute('y2', nY);

    // Aktualisierung der dynamischen Polyline-Pfade
    const baselineY = nY;
    const greenPoints = `${nX},${nY} 0,${baselineY} ${mX},${mY} ${nX},${nY}`;
    document.getElementById('greenPolyline').setAttribute('points', greenPoints);

    const redPoints = `${pX},${pY} ${nX},${nY} 0,${baselineY} ${pX},${pY}`;
    document.getElementById('redPolyline').setAttribute('points', redPoints);

    // Aktualisiere die blaue Linie zwischen newCenter und oldCenter
    const blueLine = document.getElementById('blueLine');
    blueLine.setAttribute('x1', nX);
    blueLine.setAttribute('y1', nY);
    blueLine.setAttribute('x2', oX);
    blueLine.setAttribute('y2', oY);

    // Winkelberechnung zwischen Z-Modul und newCenter
    const dx = nX - zX;
    const dy = nY - zY;
    let alpha = Math.atan2(dy, dx) * 180 / Math.PI;
    const angle_v = Math.abs(90 - alpha);

    // Winkeltext positionieren und aktualisieren
    const angleText = document.getElementById('angleText');
    angleText.setAttribute('x', zX + 10);
    angleText.setAttribute('y', zY + 10);
    angleText.textContent = `Angle: ${angle_v.toFixed(1)}°`;

    // Update des Winkelbogens um das Z-Modul (Radius 20)
    const radius = 20;
    const startAngle = 90;
    const radStart = startAngle * Math.PI / 180;
    const radEnd = alpha * Math.PI / 180;
    const startX = zX + radius * Math.cos(radStart);
    const startY = zY + radius * Math.sin(radStart);
    const endX = zX + radius * Math.cos(radEnd);
    const endY = zY + radius * Math.sin(radEnd);
    const largeArcFlag = 0;
    const sweepFlag = (alpha >= 90) ? 1 : 0;
    const d = `M ${startX},${startY} A ${radius} ${radius} 0 ${largeArcFlag} ${sweepFlag} ${endX},${endY}`;
    document.getElementById('angleArc').setAttribute('d', d);
}

// Animationsfunktion: Das Z-Modul bewegt sich vertikal, wobei als untere Grenze Punkt P
// und als obere Grenze Punkt M festgelegt sind.
function toggleAnimation() {
    const btn = document.getElementById('animateBtn');
    const speed = document.getElementById('speed').value;
    
    // Grenzen: untere Grenze von Punkt P und obere Grenze von Punkt M aus den Input-Feldern
    const zMin = parseFloat(document.getElementById('pY').value);
    const zMax = parseFloat(document.getElementById('mY').value);

    // Starte die Animation am unteren Ende (P)
    let zYVal = zMin;
    let step = (zMax - zMin) / (60 * (10 - speed + 1));
    let direction = 1;
    
    function animate() {
        zYVal += direction * step;
        if (zYVal >= zMax) {
            zYVal = zMax;
            direction = -1;
        } else if (zYVal <= zMin) {
            zYVal = zMin;
            direction = 1;
        }
        document.getElementById('zY').value = zYVal.toFixed(0);
        updatePositions();
        animationId = requestAnimationFrame(animate);
    }
    if (!isAnimating) {
        animationId = requestAnimationFrame(animate);
        btn.textContent = 'Stop Animation';
    } else {
        cancelAnimationFrame(animationId);
        btn.textContent = 'Start Animation';
    }
    isAnimating = !isAnimating;
}

updatePositions();

document.querySelectorAll('input[type="number"]').forEach(input => {
    input.addEventListener('change', updatePositions);
});
</script> </article> </div> </div> <footer class="sticky-bottom mt-5" role="contentinfo"> </footer> <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script> <script src="/assets/js/bootstrap.bundle.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/js/mdb.min.js" integrity="sha256-NdbiivsvWt7VYCt6hYNT3h/th9vSTL4EDWeGs5SN3DA=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha256-Nn1q/fx0H7SNLZMQ5Hw5JLaTRZp0yILA/FRexe19VdI=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/imagesloaded@5.0.0/imagesloaded.pkgd.min.js" integrity="sha256-htrLFfZJ6v5udOG+3kNLINIKh2gvoKqwEhHYfTTMICc=" crossorigin="anonymous"></script> <script defer src="/assets/js/masonry.js?a0db7e5d5c70cc3252b3138b0c91dcaf" type="text/javascript"></script> <script defer src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js" integrity="sha256-ZgMyDAIYDYGxbcpJcfUnYwNevG/xi9OHKaR/8GK+jWc=" crossorigin="anonymous"></script> <script defer src="/assets/js/zoom.js?85ddb88934d28b74e78031fd54cf8308"></script> <script src="/assets/js/no_defer.js?2781658a0a2b13ed609542042a859126"></script> <script defer src="/assets/js/common.js?e0514a05c5c95ac1a93a8dfd5249b92e"></script> <script defer src="/assets/js/copy_code.js?12775fdf7f95e901d7119054556e495f" type="text/javascript"></script> <script defer src="/assets/js/jupyter_new_tab.js?d9f17b6adc2311cbabd747f4538bb15f"></script> <script async src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"></script> <script async src="https://badge.dimensions.ai/badge.js"></script> <script defer type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js" integrity="sha256-MASABpB4tYktI2Oitl4t+78w/lyA+D7b/s9GEP0JOGI=" crossorigin="anonymous
